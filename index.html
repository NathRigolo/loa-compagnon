<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14307e">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>LOA Compagnon</title>
</head>
<body class="opt-cursor opt-open opt-counter opt-lowhp opt-overdrive opt-floaters opt-corners opt-scan">

  <!-- ===================== TOOLBAR ===================== -->
  <div class="toolbar">
    <button class="fiche-btn" id="ficheBtn"><span id="ficheBtnLabel">—</span></button>
    <button class="icon-btn" id="btnEdit"     title="Éditer la fiche">✎</button>
    <button class="icon-btn" id="btnImport"   title="Importer JSON">↓</button>
    <button class="icon-btn" id="btnExport"   title="Exporter JSON">↑</button>
    <button class="icon-btn" id="btnSettings" title="Réglages">⚙</button>
    <input type="file" id="fileInput" accept="application/json" hidden>
  </div>

  <!-- ===================== FENÊTRE PRINCIPALE ===================== -->
  <div class="win" id="win">
    <svg class="corner tl" viewBox="0 0 16 16"><path d="M0 0h6v2H4v2H2v2H0z" fill="currentColor"/><path d="M0 7h1v1H0zm2 0h1v1H2zm-2 2h1v1H0z" fill="currentColor"/></svg>
    <svg class="corner tr" viewBox="0 0 16 16"><path d="M0 0h6v2H4v2H2v2H0z" fill="currentColor"/><path d="M0 7h1v1H0zm2 0h1v1H2zm-2 2h1v1H0z" fill="currentColor"/></svg>
    <svg class="corner bl" viewBox="0 0 16 16"><path d="M0 0h6v2H4v2H2v2H0z" fill="currentColor"/><path d="M0 7h1v1H0zm2 0h1v1H2zm-2 2h1v1H0z" fill="currentColor"/></svg>
    <svg class="corner br" viewBox="0 0 16 16"><path d="M0 0h6v2H4v2H2v2H0z" fill="currentColor"/><path d="M0 7h1v1H0zm2 0h1v1H2zm-2 2h1v1H0z" fill="currentColor"/></svg>

    <div class="hero-head">
      <div class="portrait"><span class="initial" id="initial">?</span></div>
      <div class="hero-info">
        <div class="row-name">
          <span class="name" id="name">—</span>
          <span class="od-tag">OVERDRIVE</span>
        </div>
        <div class="meta" id="meta">—</div>
      </div>
    </div>

    <!-- STATS (6 attributs, Primary doré, clic = check rapide) -->
    <div class="stats-row" id="statsRow"></div>

    <!-- JAUGES -->
    <div class="gauges">
      <div class="gauge"><span class="lbl">HP</span>
        <div class="bar hp" id="hpbar"><div class="fill" id="hpfill"></div></div>
        <span class="val" id="hpval">0/0</span>
        <span class="adj"><button onclick="adjust('hp',-1)">−</button><button onclick="adjust('hp',1)">+</button></span>
      </div>
      <div class="gauge"><span class="lbl">SP</span>
        <div class="bar sp"><div class="fill" id="spfill"></div></div>
        <span class="val" id="spval">0/0</span>
        <span class="adj"><button onclick="adjust('sp',-1)">−</button><button onclick="adjust('sp',1)">+</button></span>
      </div>
      <div class="gauge"><span class="lbl">MP</span>
        <div class="bar mp"><div class="fill" id="mpfill"></div></div>
        <span class="val" id="mpval">0/0</span>
        <span class="adj"><button onclick="adjust('mp',-1)">−</button><button onclick="adjust('mp',1)">+</button></span>
      </div>
      <div class="gauge"><span class="lbl">DEF</span>
        <div class="bar def"><div class="fill" id="deffill"></div></div>
        <span class="val" id="defval">0/0</span>
        <span class="adj"><button onclick="adjust('def',-1)">−</button><button onclick="adjust('def',1)">+</button></span>
      </div>
      <div class="gauge"><span class="lbl">WND</span>
        <div class="bar wound"><div class="fill" id="woundfill"></div></div>
        <span class="val" id="woundval">0/6</span>
        <span class="adj"><button onclick="adjust('wounds',-1)">−</button><button onclick="adjust('wounds',1)">+</button></span>
      </div>
    </div>

    <div class="cd-row">
      <div class="die" id="cddie">d4</div>
      <div class="cd-txt">Dé de Classe<small id="cdsub">—</small></div>
      <div class="cd-act">
        <button class="btn" onclick="rollClassDie()">LANCER</button>
        <button class="btn" onclick="useCDRecovery()" title="Soin hors-combat (1× entre repos)">SOIN CD</button>
      </div>
    </div>

    <div class="statuses" id="statuses"></div>

    <div class="log">
      <div class="log-h">DERNIER JET</div>
      <div class="roll" id="rolltray"><span class="q">—</span></div>
      <div class="res" id="rollres">—</div>
    </div>
  </div>

  <!-- ===================== ACTIONS DU JEU ===================== -->
  <div class="actions">
    <button class="btn" onclick="openCheckBuilder()">LANCER CHECK</button>
    <button class="btn" onclick="shortRest()">REPOS COURT</button>
    <button class="btn" onclick="levelUp()">NIVEAU +</button>
  </div>

  <!-- ===================== DÉS LIBRES ===================== -->
  <div class="dice-tray">
    <div class="tray-h">DÉS LIBRES</div>
    <div class="tray-row">
      <div class="tray-mult">
        <button onclick="changeMult(-1)">−</button>
        <span id="diceMult">×1</span>
        <button onclick="changeMult(1)">+</button>
      </div>
      <button class="die-btn" onclick="rollFreeDie(4)">d4</button>
      <button class="die-btn" onclick="rollFreeDie(6)">d6</button>
      <button class="die-btn" onclick="rollFreeDie(8)">d8</button>
      <button class="die-btn" onclick="rollFreeDie(10)">d10</button>
      <button class="die-btn" onclick="rollFreeDie(12)">d12</button>
      <button class="die-btn" onclick="rollFreeDie(20)">d20</button>
      <button class="die-btn" onclick="rollFreeDie(100)">d100</button>
    </div>
  </div>

  <div class="foot" id="foot">LOA Compagnon · Phase 1</div>

  <!-- ===================== MODALS ===================== -->

  <!-- Modal jet de dés (modal d'animation pour tous les jets) -->
  <div class="overlay" id="rollModal">
    <div class="roll-box">
      <div class="roll-title" id="rmTitle">JET DE DÉS</div>
      <div class="roll-q" id="rmQ">—</div>
      <div class="roll-sub" id="rmSub">—</div>
      <div class="roll-tray" id="rmTray"></div>
      <div class="roll-res-big" id="rmRes">—</div>
      <div class="roll-ok" id="rmOk" onclick="closeRollModal()">VALIDER</div>
    </div>
  </div>

  <!-- Modal : choisir / créer / supprimer fiches -->
  <div class="overlay" id="fichesModal">
    <div class="modal-box">
      <h3>FICHES</h3>
      <div class="fiches-list" id="fichesList"></div>
      <div class="actions-row">
        <button class="btn" onclick="closeModal('fichesModal')">FERMER</button>
        <button class="btn" onclick="closeModal('fichesModal');openModal('newFicheModal');document.getElementById('newFicheName').value='';document.getElementById('newFicheName').focus();">+ NOUVELLE</button>
      </div>
    </div>
  </div>

  <!-- Modal construction d'un Check -->
  <div class="overlay" id="checkModal">
    <div class="modal-box">
      <h3>NOUVEAU CHECK</h3>
      <label>Attribut A</label>
      <select id="checkAttrA">
        <option>Body</option><option>Gods</option><option>Mind</option>
        <option>Shadow</option><option>Soul</option><option>World</option>
      </select>
      <label>Attribut B (laisser vide pour doubler A)</label>
      <select id="checkAttrB">
        <option value="">—</option>
        <option>Body</option><option>Gods</option><option>Mind</option>
        <option>Shadow</option><option>Soul</option><option>World</option>
      </select>
      <div class="row">
        <div>
          <label>Boons</label>
          <input type="number" id="checkBoons" value="0" min="0" max="5">
        </div>
        <div>
          <label>Banes</label>
          <input type="number" id="checkBanes" value="0" min="0" max="5">
        </div>
      </div>
      <div class="actions-row">
        <button class="btn" onclick="closeModal('checkModal')">ANNULER</button>
        <button class="btn" onclick="runCheck()">LANCER</button>
      </div>
    </div>
  </div>

  <!-- Modal édition fiche -->
  <div class="overlay" id="editModal">
    <div class="modal-box">
      <h3>ÉDITER LA FICHE</h3>
      <label>Nom</label>
      <input type="text" id="edNom">
      <label>Kin</label>
      <input type="text" id="edKin" placeholder="Human, Elf, Drakari, Croakin…">
      <label>Classe (principale) · Niveau</label>
      <div class="row">
        <input type="text" id="edClasse" placeholder="Healer, Mage, Warrior…">
        <input type="number" id="edNiveau" min="1" max="20" value="1">
      </div>
      <label>Attribut Primary</label>
      <select id="edPrimary">
        <option>Body</option><option>Gods</option><option>Mind</option>
        <option>Shadow</option><option>Soul</option><option>World</option>
      </select>
      <label>Attributs (Body / Gods / Mind / Shadow / Soul / World)</label>
      <div class="row">
        <input type="number" id="edBody"   min="0" placeholder="Body">
        <input type="number" id="edGods"   min="0" placeholder="Gods">
        <input type="number" id="edMind"   min="0" placeholder="Mind">
      </div>
      <div class="row" style="margin-top:6px">
        <input type="number" id="edShadow" min="0" placeholder="Shadow">
        <input type="number" id="edSoul"   min="0" placeholder="Soul">
        <input type="number" id="edWorld"  min="0" placeholder="World">
      </div>
      <label>HP / SP / MP / DEF (max)</label>
      <div class="row">
        <input type="number" id="edHPMax"  min="0" placeholder="HP">
        <input type="number" id="edSPMax"  min="0" placeholder="SP">
        <input type="number" id="edMPMax"  min="0" placeholder="MP" value="6">
        <input type="number" id="edDEFMax" min="0" placeholder="DEF">
      </div>
      <div class="actions-row">
        <button class="btn danger" onclick="deleteFiche()">SUPPRIMER</button>
        <button class="btn" onclick="closeModal('editModal')">ANNULER</button>
        <button class="btn" onclick="saveEdit()">ENREGISTRER</button>
      </div>
    </div>
  </div>

  <!-- Modal ajout de statut -->
  <div class="overlay" id="statusModal">
    <div class="modal-box">
      <h3>AJOUTER UN STATUT</h3>
      <label>Statut</label>
      <select id="stSelect"></select>
      <label>Valeur (optionnelle, ex. 1d4 pour Burning)</label>
      <input type="text" id="stValue" placeholder="—">
      <div class="actions-row">
        <button class="btn" onclick="closeModal('statusModal')">ANNULER</button>
        <button class="btn" onclick="addStatus()">AJOUTER</button>
      </div>
    </div>
  </div>

  <!-- Modal niveau supérieur -->
  <div class="overlay" id="lvlOverlay" onclick="this.classList.remove('show')">
    <div class="modal-box" onclick="event.stopPropagation()">
      <h3>NIVEAU SUPÉRIEUR&nbsp;!</h3>
      <div id="lvlGains"></div>
      <div class="actions-row">
        <button class="btn" onclick="closeModal('lvlOverlay')">PLUS TARD</button>
        <button class="btn" onclick="applyLevelUp()">APPLIQUER</button>
      </div>
    </div>
  </div>

  <!-- Modal réglages -->
  <div class="overlay" id="settingsModal">
    <div class="modal-box">
      <h3>RÉGLAGES</h3>
      <div id="optsList"></div>
      <div class="actions-row">
        <button class="btn" onclick="closeModal('settingsModal')">FERMER</button>
      </div>
    </div>
  </div>

  <!-- Modal nouvelle fiche -->
  <div class="overlay" id="newFicheModal">
    <div class="modal-box">
      <h3>NOUVELLE FICHE</h3>
      <label>Nom du personnage</label>
      <input type="text" id="newFicheName" placeholder="Risa, Sushi, Kael…">
      <div class="actions-row">
        <button class="btn" onclick="closeModal('newFicheModal')">ANNULER</button>
        <button class="btn" onclick="createFiche()">CRÉER</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
